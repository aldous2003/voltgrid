<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoltGrid — Sign In</title>
  <meta name="description" content="Sign in to VoltGrid IoT Prepaid Electricity Monitoring System dashboard." />
  <link rel="stylesheet" href="css/styles.css"/>
</head>

<body class="login-page">

  <!-- ── ANIMATED GRID BACKGROUND ── -->
  <div class="login-grid-bg"></div>
  <div class="login-glow login-glow-1"></div>
  <div class="login-glow login-glow-2"></div>

  <!-- ── LOGIN CONTAINER ── -->
  <main class="login-container">

    <!-- ── BRAND ── -->
    <div class="login-brand">
      <div class="login-logo-icon">VG</div>
      <div class="login-logo-text">VOLT<span class="logo-accent">GRID</span></div>
      <div class="login-tagline">IoT Prepaid Electricity Monitor</div>
    </div>

    <!-- ── LOGIN CARD ── -->
    <div class="login-card">
      <div class="login-card-header">
        <h1 class="login-title">Welcome Back</h1>
        <p class="login-subtitle">Sign in to access your dashboard</p>
      </div>

      <form class="login-form" id="login-form" autocomplete="off">
        <!-- Error message -->
        <div class="login-error" id="login-error" role="alert" aria-live="polite"></div>

        <div class="form-group">
          <label for="login-username" class="form-label">USERNAME</label>
          <div class="form-input-wrap">
            <span class="form-input-icon">U</span>
            <input type="text" id="login-username" class="form-input" placeholder="Enter your username"
              autocomplete="username" required />
          </div>
        </div>

        <div class="form-group">
          <label for="login-password" class="form-label">PASSWORD/PIN</label>
          <div class="form-input-wrap">
            <span class="form-input-icon">P</span>
            <input type="password" id="login-password" class="form-input" placeholder="Enter your password"
              autocomplete="current-password" required />
            <button type="button" class="password-toggle" id="password-toggle" aria-label="Toggle password visibility">
              <span id="eye-icon">Show</span>
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn" id="login-btn">
          <span class="login-btn-text">Sign In</span>
          <span class="login-btn-arrow">→</span>
        </button>
      </form>

      <div class="login-card-footer">
        <div class="login-status">
          <span class="pulse-dot"></span>
          <span>System Online — Live Demo</span>
        </div>
      </div>
    </div>



  </main>

  <!-- ── FOOTER ── -->
  <footer class="login-footer">
    <div class="footer-logo">VOLTGRID</div>
    <div class="footer-text">IoT Prepaid Electricity Monitoring System · ESP32 + Firebase
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script>
    // Initialize user database (hashes default passwords on first run)
    VoltAuth.initUsers().then(() => {
      // If already logged in, redirect to appropriate dashboard
      VoltAuth.redirectIfLoggedIn();
    });

    // ── Login Form Handler ──
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    const passwordInput = document.getElementById('login-password');
    const passwordToggle = document.getElementById('password-toggle');
    const eyeIcon = document.getElementById('eye-icon');

    // Toggle password visibility
    passwordToggle.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.textContent = isPassword ? 'Hide' : 'Show';
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      errorEl.textContent = '';
      errorEl.classList.remove('visible');

      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;

      // Button loading state
      btn.classList.add('loading');
      btn.disabled = true;

      // Small delay for UX, then async login
      setTimeout(async () => {
        const result = await VoltAuth.login(username, password);

        if (result.success) {
          btn.classList.remove('loading');
          btn.classList.add('success');
          document.querySelector('.login-btn-text').textContent = 'Success!';
          document.querySelector('.login-btn-arrow').textContent = 'Done';

          // Redirect after brief success animation
          setTimeout(() => {
            if (result.user.role === 'admin') {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'user.html';
            }
          }, 600);
        } else {
          btn.classList.remove('loading');
          btn.disabled = false;
          errorEl.textContent = result.error;
          errorEl.classList.add('visible');

          // Shake the card
          document.querySelector('.login-card').classList.add('shake');
          setTimeout(() => {
            document.querySelector('.login-card').classList.remove('shake');
          }, 500);
        }
      }, 800);
    });
  </script>
</body>

</html>
